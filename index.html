<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise-Wide Investigative Procedures</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="wrapper-body">

  <!-- Top Navigation -->
  <nav class="top-nav" role="navigation" aria-label="Course navigation">
    <span class="course-title">Enterprise-Wide Investigative Procedures</span>
    <div class="module-tabs" role="tablist" aria-label="Course modules">
      <button class="module-tab active" data-module="welcome" role="tab" aria-selected="true" onclick="nav.goToPage('welcome.html')">Welcome</button>
      <button class="module-tab" data-module="m1" role="tab" aria-selected="false" onclick="nav.goToPage('m1/m1-01.html')">Module 1</button>
      <button class="module-tab" data-module="m2" role="tab" aria-selected="false" onclick="nav.goToPage('m2/m2-01.html')">Module 2</button>
      <button class="module-tab" data-module="m3" role="tab" aria-selected="false" onclick="nav.goToPage('m3/m3-01.html')">Module 3</button>
      <button class="module-tab" data-module="m4" role="tab" aria-selected="false" onclick="nav.goToPage('m4/m4-select.html')">Module 4</button>
      <button class="module-tab" data-module="m5" role="tab" aria-selected="false" onclick="nav.goToPage('m5/m5-01.html')">Module 5</button>
      <button class="module-tab" data-module="completion" role="tab" aria-selected="false" onclick="nav.goToPage('completion.html')">Complete</button>
    </div>
    <img src="Media/Logo/MLF_raise-the-good-lockup-1 1.png" alt="Maple Leaf Foods — Raise the Good in Food" class="nav-logo">
  </nav>

  <!-- Progress Bar -->
  <div class="progress-bar-wrap" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Course progress">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <!-- Content Frame -->
  <iframe id="content-frame" class="content-frame" src="pages/welcome.html" title="Course content" aria-label="Course page content"></iframe>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <span class="progress-text" id="progress-text">0% Complete</span>
    <div class="nav-buttons">
      <button class="btn btn-secondary" id="btn-prev" onclick="nav.goPrev()" disabled aria-label="Previous page">&larr; Back</button>
      <button class="btn btn-primary" id="btn-next" onclick="nav.goNext()" aria-label="Next page">Next &rarr;</button>
    </div>
  </div>

  <script src="js/scorm-wrapper.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/nav.js"></script>
  <script>
    // Initialize SCORM connection
    scormAPI.initialize();

    // Initialize navigation
    nav.init();

    // Listen for score messages from assessment iframes (cross-origin fallback)
    window.addEventListener('message', function (e) {
      if (e.data && e.data.type === 'moduleScore' && window.scoring) {
        scoring.setModuleScore(e.data.module, e.data.earned, e.data.possible);
      }
    });

    // Handle window close — terminate SCORM
    window.addEventListener('beforeunload', function () {
      scormAPI.terminate();
    });
  </script>
</body>
</html>
